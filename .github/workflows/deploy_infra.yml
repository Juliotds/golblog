name: Deploy Infra

on:
  workflow_dispatch:

jobs:
  update-cloudfront-function:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update CloudFront function code
        run: |
          ETAG=$(aws cloudfront describe-function --name redirect_to_indexhtml --query 'ETag' --output text)
          CONFIG=$(aws cloudfront describe-function --name redirect_to_indexhtml --query 'FunctionSummary.FunctionConfig' --output json)
          aws cloudfront update-function \
            --name redirect_to_indexhtml \
            --function-code fileb://infra/cloudfront_functions/redirect_to_index_html.js \
            --function-config "$CONFIG" \
            --if-match "$ETAG"

      - name: Publish CloudFront function
        run: |
          ETAG=$(aws cloudfront describe-function --name redirect_to_indexhtml --query 'ETag' --output text)
          aws cloudfront publish-function \
            --name redirect_to_indexhtml \
            --if-match "$ETAG"
